<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripes RAG</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Stripes RAG</h3>
      <button id="new-chat-btn" class="outline">+ New Chat</button>

      <details open>
        <summary>Settings</summary>
        <label>Profile
          <select id="profile-select"></select>
        </label>
        <small id="profile-desc"></small>

        <label>Model
          <select id="model-select"></select>
        </label>

        <label>Language
          <select id="language-select">
            <option value="ITA">Italiano</option>
            <option value="ENG" selected>English</option>
          </select>
        </label>

        <label>Temperature: <span id="temp-value">0.3</span>
          <input type="range" id="temperature" min="0" max="1" step="0.05" value="0.3">
        </label>

        <label>Retrieval depth (k): <span id="k-value">5</span>
          <input type="range" id="k-slider" min="3" max="15" step="1" value="5">
        </label>

        <label>Max steps: <span id="steps-value">6</span>
          <input type="range" id="max-steps" min="2" max="10" step="1" value="6">
        </label>

        <label>
          <input type="checkbox" id="reranker-toggle" role="switch">
          Reranker
        </label>
      </details>

      <details open>
        <summary>History</summary>
        <div id="history-list"></div>
      </details>

      <small class="sidebar-footer">Stripes RAG v0.2</small>
    </aside>

    <!-- Main chat area -->
    <main class="chat-area">
      <div id="messages" class="messages"></div>

      <form id="chat-form" class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask a question about your indexed documents..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
      </form>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
