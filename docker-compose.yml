services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stripes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stripes}
      POSTGRES_DB: ${POSTGRES_DB:-stripes_rag}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stripes}"]
      interval: 5s
      timeout: 3s
      retries: 5
