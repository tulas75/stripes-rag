services:
  postgres:
    image: pgvector/pgvector:pg17
    shm_size: 4g
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stripes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stripes}
      POSTGRES_DB: ${POSTGRES_DB:-stripes_rag}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stripes}"]
      interval: 5s
      timeout: 3s
      retries: 5

  stripes-rag:
    build: .
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    env_file: .env
    environment:
      # Override .env for Docker-internal networking (always port 5432 container-to-container)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      EMBEDDING_DEVICE: cpu
    volumes:
      - ${DOCUMENTS_PATH:-./docs}:/docs
    depends_on:
      postgres:
        condition: service_healthy

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    ports:
      - "${TEI_PORT:-8080}:80"
    volumes:
      - tei-models:/data
    environment:
      - MODEL_ID=${EMBEDDING_MODEL:-BAAI/bge-m3}
    profiles:
      - tei

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    ports:
      - "${RERANKER_PORT:-8081}:80"
    volumes:
      - reranker-models:/data
    environment:
      - MODEL_ID=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
    profiles:
      - reranker

volumes:
  tei-models:
  reranker-models:
